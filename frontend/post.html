<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-left"><span class="header-date" id="headerDate"></span></div>
            <div class="header-center"><h1><a href="/">My Blog</a></h1></div>
            <div class="header-right"><nav><a href="/admin/dashboard.html">Admin</a></nav></div>
        </div>
    </header>

    <main class="container">
        <a href="/" class="back-link">&larr; Back to all posts</a>
        <div id="loading" class="loading">Loading...</div>
        <div id="post"></div>
        <div id="share-section" class="share-section" style="display:none">
            <h2 class="section-title">Share this post</h2>
            <div class="share-buttons">
                <button class="btn btn-secondary" onclick="shareViaNative()">Share</button>
                <button class="btn btn-secondary" onclick="copyLink()">Copy Link</button>
                <a id="shareTwitter" href="#" target="_blank" class="btn btn-secondary">Twitter</a>
                <a id="shareFacebook" href="#" target="_blank" class="btn btn-secondary">Facebook</a>
            </div>
        </div>
        <div id="error" style="display:none"></div>
        <div id="comments-section" style="display:none">
            <h2 class="section-title">Comments</h2>
            <div id="comments-list"></div>
            <div id="comment-form" class="comment-form">
                <h3>Leave a comment</h3>
                <div id="comment-error" class="alert alert-danger" style="display:none"></div>
                <div id="comment-success" class="alert alert-success" style="display:none"></div>
                <div class="form-group">
                    <label for="comment-name">Name</label>
                    <input type="text" id="comment-name" required>
                </div>
                <div class="form-group">
                    <label for="comment-content">Comment</label>
                    <textarea id="comment-content" rows="4" required></textarea>
                </div>
                <button type="button" class="btn btn-primary" onclick="handleSubmitComment()">Post Comment</button>
            </div>
        </div>
    </main>

    <script src="assets/js/api.js"></script>
    <script>
        let currentSlug = null;

        function formatDate(dateStr) {
            return new Date(dateStr).toLocaleDateString('en-US', {
                year: 'numeric', month: 'long', day: 'numeric'
            });
        }

        function formatDateTime(dateStr) {
            return new Date(dateStr).toLocaleString('en-US', {
                year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
            });
        }

        function shareViaNative() {
            if (navigator.share) {
                navigator.share({
                    title: document.title,
                    url: window.location.href,
                });
            }
        }

        async function copyLink() {
            try {
                await navigator.clipboard.writeText(window.location.href);
                const btn = event.target;
                const text = btn.textContent;
                btn.textContent = 'Copied!';
                setTimeout(() => btn.textContent = text, 2000);
            } catch (e) {
                prompt('Copy this link:', window.location.href);
            }
        }

        async function loadComments(slug) {
            try {
                const comments = await getComments(slug);
                const container = document.getElementById('comments-list');
                if (comments.length === 0) {
                    container.innerHTML = '<p style="color:#888;margin-bottom:16px">No comments yet. Be the first!</p>';
                    return;
                }
                container.innerHTML = comments.map(c => `
                    <div class="comment-card">
                        <div class="comment-header">
                            <strong>${c.name}</strong>
                            <span class="meta">${formatDateTime(c.created_at)}</span>
                        </div>
                        <div class="comment-body">${c.content}</div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('comments-list').innerHTML = '';
            }
        }

        async function handleSubmitComment() {
            const name = document.getElementById('comment-name').value;
            const content = document.getElementById('comment-content').value;
            const errorEl = document.getElementById('comment-error');
            const successEl = document.getElementById('comment-success');

            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            if (!name || !content) {
                errorEl.textContent = 'Name and comment are required.';
                errorEl.style.display = 'block';
                return;
            }

            try {
                await submitComment(currentSlug, { name, content });
                document.getElementById('comment-name').value = '';
                document.getElementById('comment-content').value = '';
                successEl.textContent = 'Comment submitted for approval.';
                successEl.style.display = 'block';
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.style.display = 'block';
            }
        }

        async function loadPost() {
            const params = new URLSearchParams(window.location.search);
            currentSlug = params.get('slug');
            if (!currentSlug) {
                document.getElementById('loading').textContent = 'No post specified.';
                return;
            }

            try {
                const post = await getPost(currentSlug);
                document.getElementById('loading').style.display = 'none';
                document.title = post.title;
                document.getElementById('post').innerHTML = `
                    <article class="post-content">
                        <h1>${post.title}</h1>
                        <div class="meta">${formatDate(post.published_at || post.created_at)} by ${post.author.name}</div>
                        ${post.featured_image ? `<img src="http://localhost:8000${post.featured_image}" alt="${post.title}" class="featured-image">` : ''}
                        <div class="body">${post.content}</div>
                    </article>
                `;
                const url = encodeURIComponent(window.location.href);
                const title = encodeURIComponent(post.title);
                document.getElementById('shareTwitter').href = `https://twitter.com/intent/tweet?text=${title}&url=${url}`;
                document.getElementById('shareFacebook').href = `https://www.facebook.com/sharer/sharer.php?u=${url}`;
                document.getElementById('share-section').style.display = 'block';
                document.getElementById('comments-section').style.display = 'block';
                loadComments(currentSlug);
            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').innerHTML = '<div class="empty-state"><h2>Post not found</h2><p><a href="/">Go back to all posts</a></p></div>';
            }
        }

        loadPost();

        document.getElementById('headerDate').textContent = (d => {
            const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
            const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            const day = d.getDate();
            const suffix = day > 3 && day < 21 ? 'th' : ['st','nd','rd'][day % 10 - 1] || 'th';
            return days[d.getDay()] + ', ' + day + suffix + ' ' + months[d.getMonth()] + ', ' + d.getFullYear();
        })(new Date());
    </script>
</body>
</html>
